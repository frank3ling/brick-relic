name: CI Quality Gate

on:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run svelte-check
      run: npx svelte-check

    - name: Run linter
      run: npm run lint

    - name: Run unit tests
      run: npm run test

    # Cache the generated catalog so CI does not re-download the Rebrickable
    # dumps on every push (key rotates when the generator changes).
    - name: Restore catalog cache
      id: catalog-cache
      uses: actions/cache@v4
      with:
        path: public/catalog
        key: catalog-${{ hashFiles('scripts/generate-local-catalog.ts') }}

    - name: Generate catalog
      if: steps.catalog-cache.outputs.cache-hit != 'true'
      run: npm run catalog

    - name: Build application
      run: npm run build:app

    - name: Install Playwright browser
      run: npx playwright install --with-deps chromium

    - name: Run E2E tests
      run: npm run e2e

    - name: Upload E2E traces on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-traces
        path: test-results/
        retention-days: 7
